<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Mohamed Abdelsamei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        min-height: 80svh;
        padding-bottom: 40px;
        margin-bottom: 0;
      }
      .err-label {
        font-family: var(--mono);
        font-size: 0.6rem;
        color: var(--dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .err-label::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
        opacity: 0.6;
      }
      .err-code {
        font-family: var(--serif);
        font-size: clamp(4rem, 18vw, 7rem);
        font-weight: 400;
        font-style: italic;
        letter-spacing: -0.03em;
        color: var(--ink);
        line-height: 1;
        margin-bottom: 12px;
        text-shadow: 0 0 40px rgba(212, 168, 83, 0.06);
      }
      .err-msg {
        font-family: var(--sans);
        font-size: 1rem;
        color: var(--text);
        margin-bottom: 6px;
        font-weight: 500;
      }
      .err-sub {
        font-family: var(--sans);
        font-size: 0.85rem;
        color: var(--dim);
        margin-bottom: 40px;
        line-height: 1.6;
      }
      .back-link {
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--dim);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 0.04em;
        padding: 12px 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        transition: color 0.2s, border-color 0.2s, background 0.2s, padding-left 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .back-link:hover {
        color: var(--primary);
        border-color: var(--primary);
        background: var(--surface2);
        padding-left: 24px;
      }
      .back-link .prompt {
        color: var(--border2);
        transition: color 0.2s, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        display: inline-block;
      }
      .back-link:hover .prompt { color: var(--primary); transform: translateX(4px); }
      .back-link:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main id="main">
      <div class="brand-bar" aria-hidden="true"></div>
      <p class="err-label">Route not found</p>
      <p class="err-code">404</p>
      <p class="err-msg">This page doesn't exist.</p>
      <p class="err-sub">The path you requested could not be resolved on this server.</p>
      <a class="back-link" href="/">
        <span class="prompt" aria-hidden="true">&rarr;</span>Return home
      </a>
    </main>
    <footer>
      <span>&copy; 2026 MABDELSAMEI.COM</span>
      <span class="footer-sep" aria-hidden="true">//</span>
      <span>STAY CURIOUS. STAY PRIVATE.</span>
    </footer>
  </body>
</html>

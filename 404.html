<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Mohamed Abdelsamei</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#0b0d0c" />
    <script>
      // Apply saved theme before first paint to avoid a flash
      (function () {
        try {
          if (localStorage.getItem('ma-theme') === 'light') {
            document.documentElement.dataset.theme = 'light';
          }
        } catch (e) { /* storage unavailable — stay dark */ }
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
    <!-- NOTE for repo: change href to "/style.css" (absolute) so the 404 styles at any URL depth -->
    <style>
      .err-main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        min-height: 72svh;
        padding: 64px;
      }
      .err-code {
        font-size: clamp(3.4rem, 12vw, 6rem);
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--head);
        margin-top: 14px;
      }
      .err-divider {
        width: 56px;
        height: 2px;
        background: var(--accent);
        margin-top: 26px;
      }
      .err-msg {
        font-size: 0.94rem;
        line-height: 1.75;
        color: var(--dim);
        max-width: 560px;
        margin-top: 24px;
      }
      .err-msg code { color: var(--head); }
      @media (max-width: 760px) {
        .err-main { padding: 56px 22px; }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <nav class="nav" aria-label="Site">
      <a href="/" class="logo">ma<span class="logo-block" aria-hidden="true"></span></a>
      <div class="nav-links">
        <a href="/#work">work</a>
        <a href="/#open-source">open_source</a>
        <a href="/blog/">writing</a>
        <a href="/#stack">stack</a>
        <a href="/#contact" class="accent">contact</a>
        <button type="button" class="theme-btn" id="theme-btn">theme --light</button>
      </div>
    </nav>

    <main id="main" class="err-main">
      <p class="prompt accent">$ cat requested_page</p>
      <h1 class="err-code">404<span class="cursor" aria-hidden="true"></span></h1>
      <div class="err-divider" aria-hidden="true"></div>
      <p class="err-msg">
        <code>cat: requested_page: No such file or directory.</code><br />
        The path you followed doesn&rsquo;t resolve here &mdash; it may have
        moved, or never existed.
      </p>
      <div class="btn-row">
        <a href="/" class="btn btn--primary">cd ~/</a>
        <a href="/blog/" class="btn">ls ~/blog</a>
      </div>
    </main>

    <footer>
      <span>&copy; 2026 mohamed abdelsamei &middot; utc+1</span>
      <span class="logo logo--sm">ma<span class="logo-block" aria-hidden="true"></span></span>
    </footer>

    <script>
      const btn = document.getElementById('theme-btn');
      const root = document.documentElement;
      const label = () => {
        btn.textContent = root.dataset.theme === 'light' ? 'theme --dark' : 'theme --light';
      };
      btn.addEventListener('click', () => {
        const next = root.dataset.theme === 'light' ? 'dark' : 'light';
        if (next === 'light') { root.dataset.theme = 'light'; }
        else { delete root.dataset.theme; }
        try { localStorage.setItem('ma-theme', next); } catch (e) { /* ignore */ }
        label();
      });
      label();
    </script>
  </body>
</html>

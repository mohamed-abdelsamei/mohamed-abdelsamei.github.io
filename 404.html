<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Mohamed Abdelsamei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        min-height: 80svh;
      }
      .err-prefix {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.48rem;
        color: var(--dim);
        letter-spacing: 0.1em;
        margin-bottom: 18px;
      }
      .err-code {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(3rem, 14vw, 5.5rem);
        color: var(--green);
        text-shadow:
          0 0 16px rgba(57, 255, 20, 0.9),
          0 0 40px rgba(57, 255, 20, 0.4),
          0 0 80px rgba(57, 255, 20, 0.15);
        line-height: 1;
        margin-bottom: 20px;
        animation: err-glitch 6s infinite;
      }
      @keyframes err-glitch {
        0%, 92%, 97%, 100% { text-shadow: 0 0 16px rgba(57,255,20,0.9), 0 0 40px rgba(57,255,20,0.4); transform: none; }
        93%  { text-shadow: -3px 0 var(--amber), 3px 0 var(--cyan); transform: translate(3px, 0); }
        94%  { text-shadow:  3px 0 var(--amber),-3px 0 var(--cyan); transform: translate(-3px, 0); }
        95%  { text-shadow: 0 0 16px rgba(57,255,20,0.9); transform: none; }
        96%  { text-shadow: -2px 0 var(--red), 2px 0 var(--green); transform: translate(1px,-1px); }
      }
      .err-msg {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.52rem;
        color: var(--amber);
        letter-spacing: 0.1em;
        margin-bottom: 8px;
        text-shadow: 0 0 8px rgba(255, 179, 0, 0.5);
      }
      .err-sub {
        font-size: 0.78rem;
        color: var(--dim);
        margin-bottom: 36px;
        letter-spacing: 0.02em;
      }
      .back-link {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.5rem;
        color: var(--text);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 14px;
        letter-spacing: 0.09em;
        padding: 10px 0;
        transition: color 0.15s, text-shadow 0.15s;
      }
      .back-link:hover {
        color: var(--green);
        text-shadow: 0 0 10px rgba(57, 255, 20, 0.6);
      }
      .back-link .prompt {
        color: var(--dim);
        transition: color 0.15s, transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        display: inline-block;
      }
      .back-link:hover .prompt {
        color: var(--green);
        transform: translateX(5px);
        text-shadow: 0 0 8px rgba(57, 255, 20, 0.8);
      }
      .back-link:focus-visible {
        outline: 1px dashed var(--green);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="vignette"  aria-hidden="true"></div>
    <main id="main">
      <p class="err-prefix">&gt; ERROR ENCOUNTERED<span class="blink">_</span></p>
      <p class="err-code">404</p>
      <p class="err-msg">[ PAGE NOT FOUND ]</p>
      <p class="err-sub">The path you requested does not exist.</p>
      <a class="back-link" href="/">
        <span class="prompt" aria-hidden="true">&gt;</span>Return home
      </a>
    </main>
    <footer>
      <span>&copy; 2026 MABDELSAMEI.COM</span>
      <span class="footer-sep" aria-hidden="true">//</span>
      <span>STAY CURIOUS. STAY PRIVATE.</span>
    </footer>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Mohamed Abdelsamei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />    <style>
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        min-height: 80svh;
        border-bottom: 2px solid var(--ink);
        padding-bottom: 40px;
        margin-bottom: 0;
      }
      .err-prefix {
        font-family: var(--mono);
        font-size: 0.62rem;
        color: var(--border2);
        letter-spacing: 0.08em;
        margin-bottom: 20px;
      }
      .err-code {
        font-family: var(--serif);
        font-size: clamp(5rem, 20vw, 9rem);
        font-weight: 400;
        font-style: italic;
        letter-spacing: -0.03em;
        color: var(--ink);
        line-height: 1;
        margin-bottom: 16px;
      }
      .err-msg {
        font-family: var(--mono);
        font-size: 0.65rem;
        color: var(--dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .err-sub {
        font-family: var(--serif);
        font-size: 1rem;
        color: var(--dim);
        font-style: italic;
        margin-bottom: 44px;
      }
      .back-link {
        font-family: var(--mono);
        font-size: 0.68rem;
        color: var(--dim);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 0.05em;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
        transition: color 0.15s, border-color 0.15s;
      }
      .back-link:hover { color: var(--ink); border-color: var(--ink); }
      .back-link .prompt {
        color: var(--border2);
        transition: color 0.15s, transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        display: inline-block;
      }
      .back-link:hover .prompt { color: var(--ink); transform: translateX(4px); }
      .back-link:focus-visible { outline: 1px solid var(--ink); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main id="main">
      <p class="err-prefix">mabdelsamei.com<span class="blink">_</span></p>
      <p class="err-code">404</p>
      <p class="err-msg">Page not found</p>
      <p class="err-sub">The path you requested does not exist.</p>
      <a class="back-link" href="/">
        <span class="prompt" aria-hidden="true">&gt;</span>Return home
      </a>
    </main>
    <footer>
      <span>&copy; 2026 MABDELSAMEI.COM</span>
      <span class="footer-sep" aria-hidden="true">·</span>
      <span>STAY CURIOUS. STAY PRIVATE.</span>
    </footer>
  </body>
</html>

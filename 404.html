<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Mohamed Abdelsamei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        min-height: 80svh;
        padding-bottom: 40px;
        margin-bottom: 0;
      }
      .err-boot {
        font-family: var(--mono);
        font-size: 0.58rem;
        color: var(--dim);
        letter-spacing: 0.04em;
        line-height: 2.0;
        margin-bottom: 32px;
      }
      .err-boot .sym { color: var(--border2); }
      .err-boot .fail { color: var(--red); }
      .err-boot .path { color: var(--amber); }
      .err-code {
        font-family: var(--mono);
        font-size: clamp(4rem, 18vw, 7rem);
        font-weight: 400;
        letter-spacing: -0.03em;
        color: var(--ink);
        line-height: 1;
        margin-bottom: 12px;
        text-shadow: 0 0 30px rgba(232, 160, 32, 0.08);
      }
      .err-msg {
        font-family: var(--mono);
        font-size: 0.56rem;
        color: var(--dim);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .err-sub {
        font-family: var(--mono);
        font-size: 0.68rem;
        color: var(--text);
        margin-bottom: 40px;
        line-height: 1.6;
      }
      .back-link {
        font-family: var(--mono);
        font-size: 0.64rem;
        color: var(--dim);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 0.05em;
        padding: 10px 16px;
        border: 1px solid var(--border2);
        background: var(--surface);
        transition: color 0.15s, border-color 0.15s, background 0.15s, padding-left 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .back-link:hover {
        color: var(--amber);
        border-color: var(--amber-dim);
        background: var(--surface2);
        padding-left: 22px;
      }
      .back-link .prompt {
        color: var(--border2);
        transition: color 0.15s, transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        display: inline-block;
      }
      .back-link:hover .prompt { color: var(--amber); transform: translateX(4px); }
      .back-link:focus-visible { outline: 1px solid var(--amber); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main id="main">
      <div class="err-boot" aria-hidden="true">
        <p><span class="sym">[</span><span class="fail">ERR</span><span class="sym">]</span> route not found <span class="path">404</span></p>
        <p><span class="sym">[</span><span class="fail">ERR</span><span class="sym">]</span> no matching handler<span class="blink">_</span></p>
      </div>
      <p class="err-code">404</p>
      <p class="err-msg">Page not found</p>
      <p class="err-sub">The path you requested does not exist on this server.</p>
      <a class="back-link" href="/">
        <span class="prompt" aria-hidden="true">&rarr;</span>Return home
      </a>
    </main>
    <footer>
      <span>&copy; 2026 MABDELSAMEI.COM</span>
      <span class="footer-sep" aria-hidden="true">//</span>
      <span>STAY CURIOUS. STAY PRIVATE.</span>
    </footer>
  </body>
</html>

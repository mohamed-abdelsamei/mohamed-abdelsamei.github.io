<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Mohamed Abdelsamei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        min-height: 80svh;
      }
      .err-code {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(3rem, 15vw, 6rem);
        color: var(--pink);
        text-shadow: 0 0 20px rgba(255, 45, 120, 0.6), 0 0 50px rgba(255, 45, 120, 0.2);
        line-height: 1;
        margin-bottom: 24px;
      }
      .err-msg {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.5625rem;
        color: var(--yellow);
        letter-spacing: 0.1em;
        margin-bottom: 36px;
        text-shadow: 0 0 8px rgba(255, 214, 0, 0.5);
      }
      .back-link {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.5625rem;
        color: var(--text);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 0.08em;
        transition: color 0.15s, text-shadow 0.15s;
      }
      .back-link:hover {
        color: var(--cyan);
        text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
      }
      .back-link .prompt {
        color: var(--dim);
        transition: color 0.15s, transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        display: inline-block;
      }
      .back-link:hover .prompt {
        color: var(--cyan);
        transform: translateX(4px);
      }
    </style>
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="vignette"  aria-hidden="true"></div>
    <main id="main">
      <p class="err-code">404</p>
      <p class="err-msg">[ PAGE NOT FOUND ]</p>
      <a class="back-link" href="/">
        <span class="prompt" aria-hidden="true">&gt;</span>Return home
      </a>
    </main>
    <footer>
      <span>&copy; 2026 MABDELSAMEI.COM</span>
    </footer>
  </body>
</html>
